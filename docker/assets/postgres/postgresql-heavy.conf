# PostgreSQL 18 + PostGIS heavy spatial profile
# 58 GB RAM | 8 fast CPU cores | fast SSD / NVMe

# Connections
listen_addresses = '*'
port = 5432
max_connections = 80
superuser_reserved_connections = 3

# Memory
shared_buffers = 14GB
effective_cache_size = 42GB
work_mem = 64MB
hash_mem_multiplier = 4.0
maintenance_work_mem = 4GB
autovacuum_work_mem = 1GB
huge_pages = try
huge_page_size = 0
jit = off
temp_buffers = 64MB
vacuum_buffer_usage_limit = 512MB
dynamic_shared_memory_type = posix
min_dynamic_shared_memory = 1GB
max_locks_per_transaction = 1024

# Session lifecycle
tcp_keepalives_count = 10
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_user_timeout = 2000000
client_connection_check_interval = 60
idle_in_transaction_session_timeout = 0
statement_timeout = 0
lock_timeout = 0

# Parallelism and Async I/O
max_worker_processes = 20
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4
parallel_leader_participation = on
io_method = worker
io_workers = 8
io_max_concurrency = 64
effective_io_concurrency = 512
maintenance_io_concurrency = 128
parallel_setup_cost = 500
parallel_tuple_cost = 0.03

# Planner costs
seq_page_cost = 1.0
random_page_cost = 1.1

# WAL & Checkpoints
wal_level = replica
wal_buffers = 64MB
max_wal_senders = 0
max_replication_slots = 0
synchronous_commit = on
wal_compression = on
max_wal_size = 32GB
min_wal_size = 8GB
checkpoint_timeout = 20min
checkpoint_completion_target = 0.9

# Autovacuum
autovacuum = on
autovacuum_max_workers = 6
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 1000
autovacuum_vacuum_insert_threshold = 10000
autovacuum_analyze_threshold = 500
autovacuum_vacuum_scale_factor = 0.02
autovacuum_vacuum_insert_scale_factor = 0.02
autovacuum_analyze_scale_factor = 0.01
autovacuum_vacuum_cost_limit = 5000
autovacuum_vacuum_cost_delay = 2ms
track_counts = on

# Planner & Statistics
default_statistics_target = 800
track_io_timing = on
enable_parallel_append = on
enable_partitionwise_join = off
enable_partitionwise_aggregate = off

# Logging
logging_collector = on
log_directory = 'pg_log'
log_destination = 'stderr,csvlog'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 200MB
log_truncate_on_rotation = on
log_line_prefix = '%m [%p] %q%u@%d/%a '
log_timezone = 'UTC'
log_min_duration_statement = 2s
log_min_duration_sample = 500ms
log_statement_sample_rate = 0.05
log_checkpoints = on
log_lock_waits = on
log_connections = off
log_disconnections = off
log_autovacuum_min_duration = 3s
log_temp_files = 64MB
client_min_messages = notice
log_min_messages = warning
log_min_error_statement = error
log_statement = 'none'
log_error_verbosity = default

# Extensions / Observability
shared_preload_libraries = 'pg_stat_statements,auto_explain'
compute_query_id = auto
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.save = on
auto_explain.log_min_duration = '1s'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = off
auto_explain.log_triggers = on
auto_explain.sample_rate = 0.03

# Locale, client, and time
client_encoding = 'UTF8'
lc_messages = 'C'
lc_monetary = 'es_ES.UTF-8'
lc_numeric  = 'es_ES.UTF-8'
lc_time     = 'es_ES.UTF-8'
datestyle = 'iso, dmy'
timezone = 'UTC'

# Safety & Diagnostics
track_activity_query_size = 32768
deadlock_timeout = 1s

# Optional PostGIS settings
postgis.enable_outdb_rasters = 1