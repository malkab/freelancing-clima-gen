# Set GIT home if the MLK_GIT_HOME env var exists
# If not set, defaults to /home/git
<% GITDIR=ENV["MLK_GIT_HOME"] %>
<% if GITDIR=="" %>
<% GITDIRF="/home/git" %>
<% else %>
<% GITDIRF=GITDIR %>
<% end %>

name: freelancing-clima-gen
root: <%= GITDIRF %>/freelancing/freelancing-clima-gen

windows:
  - work: >
      sleep 0.5 ;
      clear ;
      echo ¡Trabaja!