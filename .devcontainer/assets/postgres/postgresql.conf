###############################################
# PostGIS dev profile — i9 | 8 GB RAM | SSD
###############################################

#------------------------------------------------------------------------------
# CONNECTIONS
#------------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 120
superuser_reserved_connections = 3

#------------------------------------------------------------------------------
# MEMORY [RAM]
#------------------------------------------------------------------------------
# Rule of thumb for dev:
#   shared_buffers ≈ 20–25% of available RAM for PG
#   effective_cache_size ≈ 2.5–3× shared_buffers (represents OS cache)
#   work_mem = per sort/hash per node – watch fan-out!
#   maintenance_work_mem = for CREATE INDEX / VACUUM / ANALYZE
shared_buffers = 2GB                 # [RAM] 25% of 8 GB
effective_cache_size = 6GB           # [RAM] OS cache hint (SSD makes it effective)
work_mem = 96MB                      # [RAM] per node; safe for i9 + dev concurrency
maintenance_work_mem = 1GB           # [RAM] faster index builds, ANALYZE
huge_pages = try
# Use the default OS value.
huge_page_size = 0
jit = off                            # [CPU] JIT can slow many PostGIS ops; disable for dev
# Memory used in create temp queries.
temp_buffers = 8MB
# POSIX shared memory is best for modern OSes.
dynamic_shared_memory_type = posix
# Locks per transaction; increase if you use many tables/locks.
max_locks_per_transaction = 1024

#------------------------------------------------------------------------------
# CONNECTIONS LIFE CYCLE
#------------------------------------------------------------------------------
# TCP keepalives: how many probes before dropping.
tcp_keepalives_count = 10
# TCP keepalives: idle time before starting probes, in seconds.
tcp_keepalives_idle = 60
# TCP keepalives: interval between probes.
tcp_keepalives_interval = 10
# TCP user timeout (in milliseconds), make this larger than
# tcp_keepalives_idle + (tcp_keepalives_interval *
# tcp_keepalives_count).
tcp_user_timeout = 200000
# Time (in seconds) between checks for client disconnections
# during query execution, 0 to never. For long queries: after the
# given time, the server starts checking the client is alive. If
# not, disconnects and stops the long query.
client_connection_check_interval = 60
# Cuts a transaction that is idle in transaction.
idle_in_transaction_session_timeout = 20min
# Abort any statement that takes more than this amount of time.
statement_timeout = 20min

#------------------------------------------------------------------------------
# PARALLELISM [CPU]
#------------------------------------------------------------------------------
# i9 has many cores/threads; enable healthy parallelism.
max_worker_processes = 16            # [CPU] <= physical cores
# Max workers for parallel queries. Must be <= max_worker_processes.
max_parallel_workers = 16            # [CPU]
max_parallel_workers_per_gather = 4  # [CPU] 2–4 is plenty for dev
parallel_leader_participation = on
# In SSD it helps. In HDD, if too high, it can cause issues
# because frecuent write header repositioning.
maintenance_io_concurrency = 10
# Max workers for CREATE INDEX, VACUUM, ANALYZE. Must be <=
# max_parallel_workers.
max_parallel_maintenance_workers = 4

#------------------------------------------------------------------------------
# PLANNER COSTS & IO [SSD/HDD]
#------------------------------------------------------------------------------
# SSD: lower random_page_cost; HDD: increase it (see table below).
random_page_cost = 1.1               # [SSD] fast random IO
seq_page_cost = 1.0                  # [SSD]
effective_io_concurrency = 256       # [SSD/NVMe] high queue depth

#------------------------------------------------------------------------------
# WAL & CHECKPOINTS (safe, dev-friendly)
#------------------------------------------------------------------------------
wal_level = replica
# RAM used for WAL records. 64MB is a good value for spatial ETL.
wal_buffers = 64MB
# Used when using pg_basebackup for physical replication.
max_wal_senders = 0
max_replication_slots = 0
# Keep data safe in dev
synchronous_commit = on
wal_compression = on
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

#------------------------------------------------------------------------------
# AUTOVACUUM (keep tables fresh during edits/imports)
#------------------------------------------------------------------------------
autovacuum = on
autovacuum_naptime = 10s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_limit = 2000  # [CPU][SSD] responsive on fast boxes
autovacuum_vacuum_cost_delay = 2ms
track_counts = on

#------------------------------------------------------------------------------
# PLANNER & STATS (spatial-friendly)
#------------------------------------------------------------------------------
default_statistics_target = 500      # better estimates for skewed/spatial data
track_io_timing = on                 # [CPU] tiny overhead; useful in dev
enable_partitionwise_aggregate = on
enable_partitionwise_join = on
enable_parallel_append = on

#------------------------------------------------------------------------------
# LOGGING (dev observability)
#------------------------------------------------------------------------------
logging_collector = on
log_directory = 'pg_log'
log_destination = 'stderr,csvlog'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 200MB
log_truncate_on_rotation = on

log_line_prefix = '%m - %a %u@%d [%r] %i %e'
log_timezone = 'UTC'

log_min_duration_statement = 10s    # [TUNE] lower if you want more plans logged
log_checkpoints = on
log_connections = on
log_disconnections = on
log_autovacuum_min_duration = 0
log_lock_waits = on
# 0 for dev (logs all temp files), -1 for production.
log_temp_files = 0
client_min_messages = notice
log_min_messages = info
log_min_error_statement = notice
# For development, be very verbose. In production, set to 'none'.
log_statement = 'all'
log_error_verbosity = default

#------------------------------------------------------------------------------
# EXTENSIONS (preload for perf introspection)
#------------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements,auto_explain'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.save = on

auto_explain.log_min_duration = '150ms'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on
auto_explain.log_triggers = on
auto_explain.sample_rate = 1.0

#------------------------------------------------------------------------------
# LOCALE / CLIENT / TIME
#------------------------------------------------------------------------------
client_encoding = 'UTF8'
lc_messages = 'C'                    # English errors are easier to search
lc_monetary = 'es_ES.UTF-8'
lc_numeric  = 'es_ES.UTF-8'
lc_time     = 'es_ES.UTF-8'
datestyle = 'iso, dmy'
timezone = 'UTC'

#------------------------------------------------------------------------------
# SAFETY & TIMEOUTS
#------------------------------------------------------------------------------
track_activity_query_size = 32768
deadlock_timeout = 1s
lock_timeout = 0

#------------------------------------------------------------------------------
# OPTIONAL PostGIS knobs (uncomment if relevant)
#------------------------------------------------------------------------------
# Use only if you need raster GDAL loaders
# postgis.gdal_enabled_drivers = 'ENABLE_ALL'
postgis.enable_outdb_rasters = 1