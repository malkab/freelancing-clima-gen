services:
  # -------------------
  #
  # Nginx Reverse Proxy.
  #
  # -------------------
  nginx:
    image: nginx:1.29.2-trixie
    container_name: freelancing-clima-gen-nginx

    networks:
      - network

    ports:
      - "8865:80"

    depends_on:
      - python
      - martin

    # NGINX hace de proxy pero también sirve el frontend.
    volumes:
      - ./assets/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ..:/workspace