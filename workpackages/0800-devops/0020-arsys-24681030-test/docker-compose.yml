networks:
  network:
    name: clima-gen-test

volumes:
  postgres-data:
    name: clima-gen-test-postgres-data
    external: true

services:
  # -------------------
  #
  # Nginx.
  #
  # -------------------
  nginx:
    image: clima-gen-test-nginx:latest
    container_name: clima-gen-test-nginx
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./assets/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./assets/nginx/runtime-config.json:/app/runtime-config.json

    networks:
      - network

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s


  # -------------------
  #
  # API.
  #
  # -------------------
  api:
    image: clima-gen-test-api:latest
    container_name: clima-gen-test-api
    env_file:
      - assets/env_files/postgresql.env

    networks:
      - network

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/api/v1/health | grep ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------
  #
  # PostgreSQL.
  #
  # -------------------
  postgres:
    image: clima-gen-test-postgres:latest
    container_name: clima-gen-test-postgres
    shm_size: "3GB"
    env_file:
      - assets/env_files/postgresql.env

    volumes:
      - postgres-data:/var/lib/postgresql/
      - ./assets/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro

    networks:
      - network

    healthcheck:
      test: PGPASSWORD="${PGPASSWORD}" psql -U postgres -tAc 'select 1' -d postgres
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------
  #
  # MapLibre Martin.
  #
  # -------------------
  martin:
    image: ghcr.io/maplibre/martin:1.6.0
    container_name: clima-gen-test-martin
    restart: unless-stopped
    command: ["--config", "/config.yaml"]
    env_file:
      - assets/env_files/postgresql.env

    networks:
      - network

    volumes:
      - ./assets/martin/config.yaml:/config.yaml

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
