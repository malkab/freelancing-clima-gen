# PostgreSQL 18 general-purpose profile
# 3 GB RAM | 1 slow CPU | HDD

# Connections
listen_addresses = '*'
port = 5432
max_connections = 30
superuser_reserved_connections = 3

# Memory
shared_buffers = 768MB
effective_cache_size = 2GB
work_mem = 8MB
hash_mem_multiplier = 2.0
maintenance_work_mem = 256MB
autovacuum_work_mem = 128MB
huge_pages = try
huge_page_size = 0
jit = off
temp_buffers = 8MB
vacuum_buffer_usage_limit = 16MB
dynamic_shared_memory_type = posix
min_dynamic_shared_memory = 0
max_locks_per_transaction = 128

# Session lifecycle
tcp_keepalives_count = 10
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_user_timeout = 2000000
client_connection_check_interval = 60
idle_in_transaction_session_timeout = 0
statement_timeout = 0
lock_timeout = 0

# Parallelism and Async I/O
max_worker_processes = 4
max_parallel_workers = 0
max_parallel_workers_per_gather = 0
max_parallel_maintenance_workers = 0
parallel_leader_participation = on
io_method = worker
io_workers = 1
io_max_concurrency = 4
effective_io_concurrency = 2
maintenance_io_concurrency = 2

# Planner costs
seq_page_cost = 1.0
random_page_cost = 4.5

# WAL & Checkpoints
wal_level = replica
wal_buffers = 16MB
max_wal_senders = 0
max_replication_slots = 0
synchronous_commit = on
wal_compression = on
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# Autovacuum
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 1000
autovacuum_vacuum_insert_threshold = 5000
autovacuum_analyze_threshold = 500
autovacuum_vacuum_scale_factor = 0.05
autovacuum_vacuum_insert_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_limit = 1000
autovacuum_vacuum_cost_delay = 10ms
track_counts = on

# Planner & Statistics
default_statistics_target = 100
track_io_timing = off
enable_parallel_append = off
enable_partitionwise_join = off
enable_partitionwise_aggregate = off

# Logging
logging_collector = on
log_directory = 'pg_log'
log_destination = 'stderr,csvlog'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on
log_line_prefix = '%m [%p] %q%u@%d/%a '
log_timezone = 'UTC'
log_min_duration_statement = 3s
log_min_duration_sample = 1s
log_statement_sample_rate = 0.02
log_checkpoints = on
log_lock_waits = on
log_connections = off
log_disconnections = off
log_autovacuum_min_duration = 5s
log_temp_files = 64MB
client_min_messages = notice
log_min_messages = warning
log_min_error_statement = error
log_statement = 'none'
log_error_verbosity = default

# Extensions / Observability
shared_preload_libraries = 'pg_stat_statements'
compute_query_id = auto
pg_stat_statements.max = 5000
pg_stat_statements.track = all
pg_stat_statements.save = on

# Locale, client, and time
client_encoding = 'UTF8'
lc_messages = 'C'
lc_monetary = 'es_ES.UTF-8'
lc_numeric  = 'es_ES.UTF-8'
lc_time     = 'es_ES.UTF-8'
datestyle = 'iso, dmy'
timezone = 'UTC'

# Safety & Diagnostics
track_activity_query_size = 8192
deadlock_timeout = 1s