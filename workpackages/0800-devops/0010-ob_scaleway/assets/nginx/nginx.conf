# ---------------------------------------
#
# Despliegue arsys.
#
# Configuración con HTTP simple servido por NGINX y proxy inverso
# para el backend (FastAPI) y el servidor de teselas
# vectoriales (Martin).
#
# ---------------------------------------
worker_processes auto;
worker_rlimit_nofile 100000;

# Avoid /var/log/nginx/error.log because it is often symlinked to
# /dev/stderr
error_log /var/log/nginx/server_error.log info;

events {
    worker_connections 4096;
}

http {
    include mime.types;
    default_type application/octet-stream;

    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    client_body_timeout 30s;
    keepalive_timeout 65s;
    keepalive_requests 1000;
    reset_timedout_connection on;
    send_timeout 100s;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    log_format upstream_extensive
        '$remote_addr - $remote_user [$time_local] '
        '"$request" status=$status body_bytes_sent=$body_bytes_sent '
        'host="$host" server="$server_name" scheme=$scheme '
        'request_uri="$request_uri" uri="$uri" args="$args" '
        'referer="$http_referer" user_agent="$http_user_agent" '
        'xff="$http_x_forwarded_for" '
        'request_length=$request_length '
        'request_time=$request_time '
        'upstream_addr="$upstream_addr" '
        'upstream_status="$upstream_status" '
        'upstream_connect_time="$upstream_connect_time" '
        'upstream_header_time="$upstream_header_time" '
        'upstream_response_time="$upstream_response_time" '
        'upstream_bytes_received="$upstream_bytes_received" '
        'upstream_bytes_sent="$upstream_bytes_sent" '
        'request_id="$request_id"';

    log_format http_local
        '$remote_addr - $remote_user [$time_local] '
        '"$request" status=$status body_bytes_sent=$body_bytes_sent '
        'host="$host" server="$server_name" scheme=$scheme '
        'request_uri="$request_uri" uri="$uri" args="$args" '
        'referer="$http_referer" user_agent="$http_user_agent" '
        'xff="$http_x_forwarded_for" '
        'request_length=$request_length '
        'request_time=$request_time '
        'request_id="$request_id"';

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        root /app;
        index index.html;

        add_header X-Request-ID $request_id always;

        # Frontend static files
        location / {
            try_files $uri $uri/ /index.html;
            access_log /var/log/nginx/frontend_access.log http_local;
        }

        # Martin Vector Tile Server
        location /martin/ {
            proxy_pass http://clima-gen-martin:3000/;
            access_log /var/log/nginx/martin_access.log upstream_extensive;
            proxy_buffering on;
            proxy_read_timeout 120s;
        }

        # FastAPI
        location /api/ {
            proxy_pass http://clima-gen-api:8000;
            access_log /var/log/nginx/api_access.log upstream_extensive;
            proxy_buffering on;
            proxy_read_timeout 30s;
            client_max_body_size 20M;
        }
    }
}